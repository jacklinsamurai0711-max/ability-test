<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">

<title>領導學程推薦書單</title>

<style>

body{
 font-family:-apple-system,BlinkMacSystemFont;
 background:linear-gradient(135deg,#a18cd1,#fbc2eb);
 margin:0;
 padding:20px;
}

.container{
 max-width:500px;
 margin:auto;
}

h1{
 color:white;
}

.book{
 background:white;
 border-radius:16px;
 padding:15px;
 margin-bottom:15px;
 box-shadow:0 10px 20px rgba(0,0,0,0.2);
 transform:translateY(30px);
 opacity:0;
 animation:fadeUp 0.6s forwards;
}

.book img{
 width:100%;
 border-radius:10px;
}

.book-title{
 font-size:18px;
 margin-top:10px;
 font-weight:bold;
}

button{
 width:100%;
 padding:15px;
 border:none;
 border-radius:12px;
 font-size:16px;
 margin-top:20px;
 background:#6c63ff;
 color:white;
}

@keyframes fadeUp{
 to{
  transform:translateY(0);
  opacity:1;
 }
}

</style>
</head>

<body>

<div class="container">

<h1>領導學程推薦書單</h1>

<div id="list"></div>

<button onclick="shareImage()">
分享你的書單(下載圖片)
</button>
 
<button onclick="goBack()">
重新選擇能力
</button>

</div>

<script>

const books = {

 project_system:{
 title:"一頁紙做兩倍事，高效專案工作法",
 image:"images/one_paper.png",
 url:"https://leadership.ntu.edu.tw/high-efficiency-project-management/"
 },

 content_business:{
 title:"內容電力公司",
 image:"images/content.jpg",
 url:"https://leadership.ntu.edu.tw/content-marketing/"
 },

 productivity:{
 title:"最有生產力的一年",
 image:"images/produce.jpg",
 url:"https://leadership.ntu.edu.tw/effective_productivity_habit/"
 },

 read_room:{
 title:"閱讀空氣懂人心",
 image:"images/air.png",
 url:"https://leadership.ntu.edu.tw/read-the-room/"
 },

 charisma:{
 title:"魅力學",
 image:"images/charm.jpg",
 url:"https://leadership.ntu.edu.tw/%e9%ad%85%e5%8a%9b%e5%ad%b8%ef%bc%9a%e7%84%a1%e5%be%80%e4%b8%8d%e5%88%a9%e7%9a%84%e8%87%aa%e6%88%91%e7%b6%93%e7%87%9f%e8%a1%93/"
 },

 product_planning:{
 title:"熱賣商品企劃力",
 image:"images/marketing.jpg",
 url:"https://leadership.ntu.edu.tw/best-selling_product_planning/"
 },
 
 innovation:{
 title:"破框思維的技術",
 image:"images/out_box.jpg",
 url:"https://leadership.ntu.edu.tw/%e7%a0%b4%e6%a1%86%e6%80%9d%e7%b6%ad6%e6%ad%a5%e9%a9%9f%e7%94%a8%e5%85%a8%e4%ba%ba%e9%a1%9e%e7%9a%84%e6%99%ba%e6%85%a7%e7%a9%8d%e7%b4%af%e8%a7%a3%e6%b1%ba%e5%95%8f%e9%a1%8c/"
 },
 
 idea_system:{
 title:"點子流",
 image:"images/ideas.jpg",
 url:"https://leadership.ntu.edu.tw/%e9%bb%9e%e5%ad%90%e6%b5%81/"
 },

 communication:{
 title:"溝通的黃金法則",
 image:"images/communicate.jpg",
 url:"https://leadership.ntu.edu.tw/%e6%ba%9d%e9%80%9a%e7%9a%84%e9%bb%83%e9%87%91%e6%b3%95%e5%89%87/"
 },

 thoughtfulness:{
 title:"體貼是練出來的",
 image:"images/tender.jpg",
 url:"https://leadership.ntu.edu.tw/thoughtfulness-is-a-skill-you-build/"
 },
 
 focus:{
 title:"深度數位大掃除",
 image:"images/digitclean.jpg",
 url:"https://leadership.ntu.edu.tw/digital-minimalism/"
 },
 
 learning:{
 title:"超速進步",
 image:"images/upgrade.jpg",
 url:"https://leadership.ntu.edu.tw/get-better-at-anything/"
 }
 
};

const selected=JSON.parse(localStorage.getItem("selectedSkills")||"[]");

const list=document.getElementById("list");

selected.forEach((skillId,i)=>{

 if(!books[skillId]) return;

 const book=books[skillId];

 list.innerHTML+=`

 <div class="book" style="animation-delay:${i*0.1}s">

   <img src="${book.image}">

   <div class="book-title">
     ${book.title}
   </div>

   <button onclick="openBook('${book.url}')">
   查看介紹
   </button>

 </div>

 `;

});

function openBook(url){

 window.open(url);

}

function goBack(){

 window.location.href="index.html";

}

async function shareImage(){

 const name = prompt("請輸入你的名字");

 if(!name) return;

 const canvas = document.createElement("canvas");
 const ctx = canvas.getContext("2d");

 canvas.width = 1080;
 canvas.height = 1920;

 // ===== 載入背景 =====

 const template = new Image();
 template.src = "images/template_re.jpg";

 await new Promise(res=>template.onload=res);

 ctx.drawImage(template,0,0,1080,1920);

 // ===== 字體設定（關鍵改善） =====

 ctx.fillStyle="#2B2B2B";
 ctx.textAlign="center";

 // 主標題
 ctx.font="bold 64px 'Noto Sans TC', sans-serif";

 ctx.fillText(
   `最適合 ${name} 開啟2026年的`,
   540,
   180
 );

 // ===== 取得書 =====

 const selected = JSON.parse(
   localStorage.getItem("selectedSkills") || "[]"
 );

 const bookList = selected
   .map(id=>books[id])
   .filter(Boolean);

 const count = bookList.length;

 // ===== 強調數字 =====

 ctx.fillStyle="#C48B5A";

 ctx.font="bold 100px 'Noto Sans TC', sans-serif";

 ctx.fillText(
   `${count}`,
   520,
   300
 );

 ctx.fillStyle="#2B2B2B";

 ctx.font="bold 60px 'Noto Sans TC', sans-serif";

 ctx.fillText(
   `本書`,
   560,
   300
 );

 // ===== 畫書封（保持比例，不壓縮） =====

 let y = 400;

 const maxWidth = 800;
 const maxHeight = 380;

 for(const book of bookList){

   const img = new Image();
   img.src = book.image;

   await new Promise(res=>img.onload=res);

   // 計算比例（關鍵）
   const ratio = Math.min(
     maxWidth / img.width,
     maxHeight / img.height
   );

   const width = img.width * ratio;
   const height = img.height * ratio;

   const x = (1080 - width) / 2;

   ctx.drawImage(
     img,
     x,
     y,
     width,
     height
   );

   y += height + 40;

 }



 // ===== 下載 =====

 const link=document.createElement("a");

 link.download=`${name}_2026推薦書單.png`;

 link.href=canvas.toDataURL("image/png",1.0);

 link.click();

}
 
</script>

</body>
</html>
