<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>能力投資測驗</title>

<style>

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(135deg,#ffe29f,#ffa99f,#ff719a);
  margin:0;
  padding:20px;
}

.container{
  max-width:500px;
  margin:auto;
}

h1{
  font-size:24px;
  line-height:1.5;
  color:#333;
}

.points{
  font-size:20px;
  margin:15px 0;
  color:#333;
  font-weight:bold;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:white;
  padding:14px;
  border-radius:14px;
  font-size:16px;
  cursor:pointer;
  border:3px solid transparent;
  text-align:center;
  transition:0.2s;
}

.card:active{
  transform:scale(0.95);
}

.card.selected{
  background:#ff4d6d;
  color:white;
}

button{
  width:100%;
  padding:16px;
  font-size:18px;
  margin-top:20px;
  border-radius:14px;
  border:none;
  background:#6c63ff;
  color:white;
  font-weight:bold;
}

button:disabled{
  background:gray;
}

</style>
</head>

<body>

<div class="container">

<h1>
新的一年你獲得了100點能力點<br><br>
請問你想要學習哪些能力
</h1>

<div class="points">
剩餘點數：<span id="remain">100</span>
</div>

<div class="grid" id="skillGrid"></div>

<button id="resultBtn" disabled>
查看推薦書單
</button>

</div>

<script>

const skills = [
 {id:"read_room",name:"閱讀空氣",cost:30},
 {id:"charisma",name:"魅力培養",cost:40},
 {id:"product_planning",name:"長銷商品企劃力",cost:50},
 {id:"innovation",name:"破框創新思維",cost:40},
 {id:"idea_system",name:"系統化創意產出",cost:30},
 {id:"communication",name:"高效溝通",cost:40},
 {id:"productivity",name:"高效生產力",cost:30},
 {id:"thoughtfulness",name:"職場體貼行為",cost:20},
 {id:"focus",name:"贏回注意力",cost:30},
 {id:"project_system",name:"系統化專案控管",cost:50},
 {id:"content_business",name:"內容創業思維",cost:40},
 {id:"learning",name:"高效學習",cost:40}
];

let total=100;
let used=0;
let selected=[];

const grid=document.getElementById("skillGrid");
const remain=document.getElementById("remain");
const resultBtn=document.getElementById("resultBtn");

skills.forEach(skill=>{

 const card=document.createElement("div");

 card.className="card";

 card.innerHTML=`
   ${skill.name}
   <br>
   ${skill.cost}點
 `;

 card.onclick=()=>{

   if(selected.includes(skill.id)){

     selected=selected.filter(s=>s!==skill.id);
     used-=skill.cost;
     card.classList.remove("selected");

   }else{

     if(used+skill.cost>total){
       alert("點數不足");
       return;
     }

     selected.push(skill.id);
     used+=skill.cost;
     card.classList.add("selected");

   }

   remain.innerText=total-used;

   resultBtn.disabled=selected.length===0;

 };

 grid.appendChild(card);

});


resultBtn.onclick=()=>{

 localStorage.setItem("selectedSkills",JSON.stringify(selected));

 window.location.href="result.html";

};

</script>

</body>
</html>
